[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"
fs_permissions = [{ access = "read-write", path = "./deployments" }]

# Testing
ffi = true
verbosity = 3
fuzz = { runs = 256 }
invariant = { runs = 256, depth = 15 }

# Formatter
line_length = 120
tab_width = 4
bracket_spacing = true

[profile.default.fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "params_first"
sort_imports = true

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
localhost = "http://127.0.0.1:8545"

[etherscan]
base = { key = "${BASESCAN_API_KEY}", url = "https://api.basescan.org/api" }
base_sepolia = { key = "${BASESCAN_API_KEY}", url = "https://api-sepolia.basescan.org/api" }

[profile.ci]
fuzz = { runs = 1000 }
invariant = { runs = 1000, depth = 25 }
verbosity = 2

[profile.lite]
fuzz = { runs = 32 }
invariant = { runs = 32, depth = 5 }
optimizer = false
